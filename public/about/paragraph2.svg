<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="41.370712mm"
   height="29.850121mm"
   viewBox="0 0 41.370712 29.850121"
   version="1.1"
   id="svg1"
   xml:space="preserve"
   xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Left-to-right gradient across the full viewBox width -->
    <linearGradient id="borderGradient" x1="0" y1="0" x2="41.370712" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7e22ce"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Mask: renders the artwork in white on black so the gradient shows only through the strokes -->
    <mask id="strokeMask">
      <g transform="translate(-100.40765,-138.09861)">
        <g style="fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"
           transform="matrix(1.148087,0,0,1.148087,94.667217,138.16722)">
          <circle cx="12" cy="5" r="1"/>
          <path d="m 9,20 3,-6 3,6"/>
          <path d="m 6,8 6,2 6,-2"/>
          <path d="m 12,10 v 4"/>
        </g>
        <g transform="matrix(1.148087,0,0,1.148087,122.3179,139.95991)">
          <g transform="translate(-13.049662,3.3786549)"
             style="fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
            <circle cx="12" cy="5" r="1"/>
            <path d="m 9,20 3,-6 3,6"/>
            <path d="m 6,8 6,2 6,-2"/>
            <path d="m 12,10 v 4"/>
          </g>
          <g transform="translate(-2.049662,-4.6212215)"
             style="fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round">
            <circle cx="12" cy="5" r="1"/>
            <path d="m 9,20 3,-6 3,6"/>
            <path d="m 6,8 6,2 6,-2"/>
            <path d="m 12,10 v 4"/>
          </g>
        </g>
      </g>
    </mask>
  </defs>

  <!-- Gradient rectangle, clipped to stroke shapes via the mask -->
  <rect x="0" y="0" width="41.370712" height="29.850121"
        fill="url(#borderGradient)"
        mask="url(#strokeMask)"/>

</svg>
